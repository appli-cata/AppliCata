<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AppliCata - PC CATA</title>
    
    <!-- CONFIGURATION PLEIN ÉCRAN IPHONE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AppliCata">
    
    <!-- Icône pour l'écran d'accueil -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/appli-cata/AppliCata/main/favicon.png">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/appli-cata/AppliCata/main/favicon.png">

    <style>
        :root {
            --bg: #0f172a; --card-bg: #020617;
            --text: #e5e7eb; --muted: #9ca3af; --border: #1f2937;
            --red: #ef4444; --yellow: #f59e0b; --green: #22c55e;
            --black: #111827; --accent: #38bdf8;
            --neutral-btn: #1e293b;
        }

        /* Reset et gestion de l'encoche iPhone (Safe Area) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; touch-action: manipulation; }
        
        body { 
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            /* Empêche le contenu de toucher l'heure/encoche */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow-x: hidden; 
        }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; }

        .app { max-width: 1250px; width: 100%; background: rgba(15, 23, 42, 0.98); border-radius: 18px; padding: 10px; box-shadow: 0 18px 60px rgba(0, 0, 0, 0.65); border: 1px solid rgba(55, 65, 81, 0.8); backdrop-filter: blur(12px); display: none; }
        
        .global-summary {
            background: linear-gradient(90deg, #1e293b, #020617); border: 1px solid var(--accent); border-radius: 12px;
            padding: 8px; margin-bottom: 10px; display: flex; justify-content: space-around; text-align: center;
        }
        .summary-item { flex: 1; border-right: 1px solid var(--border); }
        .summary-item:last-child { border-right: none; }
        .summary-label { font-size: 0.55rem; color: var(--accent); text-transform: uppercase; font-weight: bold; }
        .summary-total { font-size: 1.1rem; font-weight: 800; color: white; }

        .header-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
        .datetime-display { font-family: monospace; font-size: 0.75rem; color: var(--accent); background: #1e293b; padding: 4px 8px; border-radius: 6px; }
        
        .mode-bar { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.8rem; }
        .lock-btn { background: #1e293b; border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; }
        .lock-btn.locked { border-color: var(--yellow); background: rgba(245, 158, 11, 0.1); }
        .locked-data { opacity: 0.35 !important; filter: grayscale(1); }

        .tabs-container { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 5px; border-bottom: 1px solid var(--border); }
        .tab { padding: 6px 12px; border-radius: 999px; border: 1px solid #374151; background: #020617; color: white; cursor: pointer; white-space: nowrap; font-size: 0.75rem; }
        .tab.active { background: linear-gradient(135deg, #22c55e, #0ea5e9); color: #020617; font-weight: bold; }

        main { display: grid; grid-template-columns: 1fr 380px; gap: 12px; }
        @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }

        .category-card { background: #020617; border: 1px solid var(--border); padding: 10px; border-radius: 16px; }
        .count-value { font-size: 1.8rem; font-weight: 800; text-align: center; margin: 4px 0; }
        
        .section-box { background: #020617; border: 1px solid var(--border); padding: 10px; border-radius: 16px; margin-bottom: 10px; }
        .section-title { color: var(--accent); font-size: 0.65rem; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
        
        input, select, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 7px; border-radius: 6px; margin-bottom: 5px; font-size: 0.8rem; }
        .btn-primary { background: linear-gradient(135deg, #0ea5e9, #22c55e); color: #020617; font-weight: bold; padding: 10px; border: none; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 5px; }
        
        .btn-counter { background: var(--neutral-btn); color: white; border: 1px solid #334155; font-size: 1.2rem; font-weight: bold; padding: 8px; border-radius: 8px; width: 100%; cursor: pointer; }

        .besoin-row { display: flex; gap: 4px; margin-bottom: 6px; }
        .btn-plus { background: #1e293b; border: 1px dashed var(--accent); color: var(--accent); padding: 6px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 0.7rem; font-weight: bold; }
        .btn-remove { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); color: var(--red); border-radius: 6px; padding: 4px 10px; cursor: pointer; }

        .flex-row { display: flex; gap: 4px; align-items: center; }
        .map-link-btn { background: #0ea5e9 !important; color: white !important; opacity: 0.3; pointer-events: none; height: 32px; width: 32px; border-radius: 6px; border: none; display: flex; align-items: center; justify-content: center;}
        .map-link-btn.active { opacity: 1; pointer-events: auto; }

        footer { text-align: center; padding: 15px 0; color: var(--muted); font-size: 0.65rem; width: 100%; }
    </style>
</head>
<body>

<!-- ... (Le reste du HTML reste identique aux versions précédentes) ... -->

<div id="loginScreen">
    <div class="login-box">
        <img src="https://raw.githubusercontent.com/appli-cata/AppliCata/main/favicon.png" style="width: 70px; margin-bottom: 15px; border-radius: 12px;">
        <h2 style="margin-bottom: 20px; color: var(--accent);">Accès SAMU 30</h2>
        <input type="password" id="passInput" placeholder="Mot de passe" style="text-align: center; font-size: 1.1rem;">
        <button class="btn-primary" onclick="checkPass()">CONNEXION</button>
    </div>
</div>

<div class="app" id="appMain">
    <!-- SYNTHESE -->
    <div class="global-summary">
        <div class="summary-item"><div class="summary-label">Total Victimes</div><div class="summary-total" id="global-total">0</div></div>
        <div class="summary-item"><div class="summary-label">UA</div><div class="summary-total" id="global-ua" style="color:var(--red)">0</div></div>
        <div class="summary-item"><div class="summary-label">UR</div><div class="summary-total" id="global-ur" style="color:var(--yellow)">0</div></div>
        <div class="summary-item"><div class="summary-label">Impliqués</div><div class="summary-total" id="global-green" style="color:var(--green)">0</div></div>
    </div>

    <div class="header-top">
        <div id="clock" class="datetime-display">--/--/---- --:--:--</div>
        <button id="lockBtn" class="lock-btn locked" onclick="toggleLock()"><span id="lockIcon">🔒</span></button>
    </div>

    <div class="header-top">
        <div class="mode-bar">
            <div style="display:flex; gap:10px;">
                <label><input type="radio" name="mode" value="EXERCICE" checked onchange="updateMode('EXERCICE')"> EXO</label>
                <label><input type="radio" name="mode" value="RÉEL" onchange="updateMode('RÉEL')"> RÉEL</label>
            </div>
            <div id="modeStatus" style="font-weight:bold;">EXERCICE</div>
        </div>
    </div>

    <header>
        <div class="tabs-container" id="tabList"></div>
        <div class="section-box" style="background: rgba(56, 189, 248, 0.05);">
            <div class="flex-row" style="margin-bottom: 8px;">
                <h1 id="activeTitle" style="color: white; font-size: 1.1rem;">PRV 1</h1>
                <button class="action-btn" onclick="renameCurrentZone()" style="background:none; border:none; color:var(--accent);">✎</button>
                <div style="flex-grow: 1;"></div>
                <button class="action-btn" onclick="resetAllData()" style="color:var(--red); background:none; border:none; font-size:0.65rem;">RÀZ</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <input type="text" id="medName" placeholder="MÉDECIN" oninput="updateMed(this.value)" class="action-btn">
                <div class="flex-row">
                    <input type="text" id="siteLoc" placeholder="LOCALISATION" oninput="updateSiteLoc(this.value)" class="action-btn">
                    <button onclick="getGPSLocation('siteLoc')" style="background:#1e293b; border:1px solid var(--border); border-radius:6px; height:32px; width:32px; color:white;" class="action-btn">📍</button>
                    <button id="openSiteMap" class="map-link-btn action-btn" onclick="openStoredMap(this)">🗺️</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section>
            <div class="section-box">
                <div class="section-title">Sinistre Global</div>
                <div class="flex-row">
                    <input type="text" id="locSinistre" placeholder="Adresse sinistre" oninput="updateGlobalLoc(this.value)" class="action-btn">
                    <button onclick="getGPSLocation('locSinistre')" style="background:#1e293b; border:1px solid var(--border); border-radius:6px; height:32px; width:32px; color:white;" class="action-btn">📍</button>
                    <button id="openGlobalMap" class="map-link-btn action-btn" onclick="openStoredMap(this)">🗺️</button>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div class="category-card" style="border-top: 3px solid var(--red);">
                    <div class="section-title">UA</div><div class="count-value" id="count-red">0</div>
                    <div class="flex-row"><button class="btn-counter action-btn" onclick="changeVal('red', -1)">-</button><button class="btn-counter action-btn" onclick="changeVal('red', 1)">+</button></div>
                </div>
                <div class="category-card" style="border-top: 3px solid var(--yellow);">
                    <div class="section-title">UR</div><div class="count-value" id="count-yellow">0</div>
                    <div class="flex-row"><button class="btn-counter action-btn" onclick="changeVal('yellow', -1)">-</button><button class="btn-counter action-btn" onclick="changeVal('yellow', 1)">+</button></div>
                </div>
                <div class="category-card" style="border-top: 3px solid var(--green);">
                    <div class="section-title">IMP</div><div class="count-value" id="count-green">0</div>
                    <div class="flex-row"><button class="btn-counter action-btn" onclick="changeVal('green', -1)">-</button><button class="btn-counter action-btn" onclick="changeVal('green', 1)">+</button></div>
                </div>
                <div class="category-card" style="border-top: 3px solid var(--black);">
                    <div class="section-title">DCD</div><div class="count-value" id="count-black">0</div>
                    <div class="flex-row"><button class="btn-counter action-btn" onclick="changeVal('black', -1)">-</button><button class="btn-counter action-btn" onclick="changeVal('black', 1)">+</button></div>
                </div>
            </div>
        </section>

        <aside>
            <div class="section-box">
                <div class="section-title">Besoins</div>
                <div id="besoinsContainer"></div>
                <button class="btn-plus action-btn" onclick="addNewBesoin()">+ AJOUTER BESOIN</button>
            </div>
            <div class="section-box">
                <div class="section-title">Radio & Logistique</div>
                <input type="text" id="locPRM" placeholder="Localisation PRM" class="local-saisie">
                <select id="evolStatus" class="local-saisie"><option value="NON ÉVOLUTIVE">SITUATION FIXE</option><option value="ÉVOLUTIVE">SITUATION ÉVOLUTIVE</option></select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <select id="typo1" class="local-saisie"><option value="">Nature 1</option></select>
                    <select id="typo2" class="local-saisie"><option value="">Nature 2</option></select>
                </div>
                <input type="text" id="vlmId" value="SMUR 1" class="local-saisie">
                <button class="btn-primary" onclick="generateBilan()">GÉNÉRER SEQUENCE RADIO</button>
            </div>
            <textarea id="radioText" rows="10" readonly style="font-size: 0.65rem; color: var(--accent);"></textarea>
        </aside>
    </main>
</div>

<footer>&copy; 2026 AppliCata <span style="color:var(--accent)">v2.1.2</span></footer>

<script type="module">
    // ... (Le script JavaScript reste identique, il gère la logique Firebase et l'affichage) ...
    // Note : Assurez-vous d'inclure tout le bloc script de la réponse précédente ici.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCgZkgOClz8-iE21eCch2cggUXlqJ12fGc", 
        databaseURL: "https://triage-cata-pc-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "triage-cata-pc" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const triageRef = ref(db, 'triage_live');

    let isLocked = true;
    let localCurrentZone = "PRV 1"; 
    let state = { mode: "EXERCICE", globalLoc: "", globalGPSUrl: "", zones: { "PRV 1": { red: 0, yellow: 0, green: 0, black: 0, med: "", loc: "", gpsUrl: "", besoins: [] } } };

    const besoinsOptions = ["Prévenir DSM d'astreinte", "Equipes médicales", "Infirmier (VLI)", "Lot PSM", "Antidotes", "Sacs damage control", "Unité de décontamination (UMD)", "Vecteurs terrestres", "Vecteurs aériens (Hélicoptère)", "CUMP", "Oxygène", "Soutien sanitaire opérationnel", "Autre : préciser"];
    const typs = ["Plaies par balles", "Plaies par arme blanche", "AVP – traumatologie", "Accident train", "Accident avion", "Incendie / explosion", "Intoxications", "Risque NRBC", "Catastrophe naturelle", "Autre"];

    signInAnonymously(auth).then(() => {
        onValue(triageRef, (s) => { if(s.val()) { state = s.val(); render(); } else { save(); } });
    });

    const t1 = document.getElementById('typo1'), t2 = document.getElementById('typo2');
    typs.forEach(t => { t1.add(new Option(t,t)); t2.add(new Option(t,t)); });

    window.save = () => set(triageRef, state);
    window.checkPass = () => { if(document.getElementById('passInput').value === "SAMU30") { document.getElementById('loginScreen').style.display='none'; document.getElementById('appMain').style.display='block'; }};
    window.toggleLock = () => { isLocked = !isLocked; render(); };

    window.changeVal = (c, n) => { if(!isLocked) { state.zones[localCurrentZone][c] = Math.max(0, (state.zones[localCurrentZone][c]||0)+n); save(); }};
    window.updateMed = (v) => { state.zones[localCurrentZone].med = v; save(); };
    window.updateSiteLoc = (v) => { state.zones[localCurrentZone].loc = v; save(); };
    window.updateMode = (v) => { state.mode = v; save(); };
    window.updateGlobalLoc = (v) => { state.globalLoc = v; save(); };

    window.addNewBesoin = () => {
        if(!isLocked) {
            if(!state.zones[localCurrentZone].besoins) state.zones[localCurrentZone].besoins = [];
            state.zones[localCurrentZone].besoins.push({ type: besoinsOptions[0], text: "" });
            save();
        }
    };
    window.updateBesoinType = (idx, val) => { state.zones[localCurrentZone].besoins[idx].type = val; save(); };
    window.updateBesoinText = (idx, val) => { state.zones[localCurrentZone].besoins[idx].text = val; save(); };
    window.removeBesoin = (idx) => { state.zones[localCurrentZone].besoins.splice(idx, 1); save(); };

    window.getGPSLocation = (fieldId) => {
        if (!navigator.geolocation) return;
        const btn = event.currentTarget; btn.innerText = "⌛";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const gpsUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                const clean = data.display_name.split(',').slice(0,3).join(',');
                document.getElementById(fieldId).value = clean;
                if(fieldId === 'siteLoc') { state.zones[localCurrentZone].loc = clean; state.zones[localCurrentZone].gpsUrl = gpsUrl; }
                else { state.globalLoc = clean; state.globalGPSUrl = gpsUrl; }
                save(); btn.innerText = "📍";
            } catch (e) { btn.innerText = "📍"; }
        }, () => btn.innerText = "📍");
    };

    window.openStoredMap = (btn) => { const url = btn.getAttribute('data-url'); if(url) window.open(url, '_blank'); };
    window.switchZone = (z) => { localCurrentZone = z; render(); };
    window.addZone = (p) => { if(!isLocked) { let n = p + " " + (Object.keys(state.zones).length + 1); state.zones[n] = { red: 0, yellow: 0, green: 0, black: 0, med: "", loc: "", besoins: [] }; localCurrentZone = n; save(); }};
    window.renameCurrentZone = () => { if(!isLocked) { const n = prompt("Nom :", localCurrentZone); if(n) { state.zones[n] = state.zones[localCurrentZone]; delete state.zones[localCurrentZone]; localCurrentZone = n; save(); }}};
    window.resetAllData = () => { if(!isLocked && confirm("Tout effacer ?")) { state.zones = { "PRV 1": { red: 0, yellow: 0, green: 0, black: 0, med: "", loc: "", besoins: [] } }; save(); }};

    function render() {
        const cz = state.zones[localCurrentZone];
        let tUA=0, tUR=0, tV=0;
        Object.values(state.zones).forEach(z => { tUA += (z.red||0); tUR += (z.yellow||0); tV += (z.green||0); });
        document.getElementById('global-total').innerText = tUA+tUR+tV;
        document.getElementById('global-ua').innerText = tUA; document.getElementById('global-ur').innerText = tUR; document.getElementById('global-green').innerText = tV;

        document.getElementById('tabList').innerHTML = Object.keys(state.zones).map(z => `<button class="tab ${z===localCurrentZone?'active':''}" onclick="switchZone('${z}')">${z}</button>`).join('') + `<button class="tab action-btn" onclick="addZone('PMA')">+ PMA</button>`;
        
        document.getElementById('activeTitle').innerText = localCurrentZone;
        document.getElementById('count-red').innerText = cz.red; document.getElementById('count-yellow').innerText = cz.yellow; document.getElementById('count-green').innerText = cz.green; document.getElementById('count-black').innerText = cz.black;
        document.getElementById('medName').value = cz.med || ""; document.getElementById('siteLoc').value = cz.loc || "";
        document.getElementById('locSinistre').value = state.globalLoc || "";
        document.getElementById('modeStatus').innerText = state.mode;

        const bS = document.getElementById('openSiteMap'); if(cz.gpsUrl){ bS.setAttribute('data-url', cz.gpsUrl); bS.classList.add('active'); } else bS.classList.remove('active');
        const bG = document.getElementById('openGlobalMap'); if(state.globalGPSUrl){ bG.setAttribute('data-url', state.globalGPSUrl); bG.classList.add('active'); } else bG.classList.remove('active');

        const bCont = document.getElementById('besoinsContainer');
        bCont.innerHTML = (cz.besoins || []).map((b, i) => `
            <div class="besoin-row">
                <div style="flex-grow:1;">
                    <select onchange="updateBesoinType(${i}, this.value)" class="action-btn">
                        ${besoinsOptions.map(o => `<option value="${o}" ${b.type===o?'selected':''}>${o}</option>`).join('')}
                    </select>
                    ${b.type.includes('Autre') ? `<input type="text" placeholder="Détaillez..." value="${b.text}" oninput="updateBesoinText(${i}, this.value)" class="action-btn">` : ''}
                </div>
                <button class="btn-remove action-btn" onclick="removeBesoin(${i})">✕</button>
            </div>
        `).join('');

        document.querySelectorAll('.action-btn, .local-saisie, .btn-counter').forEach(el => el.disabled = isLocked);
        document.getElementById('lockIcon').innerText = isLocked ? "🔒" : "🔓";
        document.getElementById('lockBtn').className = isLocked ? "lock-btn locked" : "lock-btn";
        document.querySelectorAll('.count-value').forEach(c => isLocked ? c.classList.add('locked-data') : c.classList.remove('locked-data'));
    }

    window.generateBilan = () => {
        const cz = state.zones[localCurrentZone];
        const prefix = state.mode === "EXERCICE" ? "*** EXERCICE ***\n" : "*** RÉEL ***\n";
        const needs = (cz.besoins || []).map(b => `- ${b.type}${b.text?' : '+b.text:''}`).join('\n');
        let msg = `${prefix}HORODATAGE : ${new Date().toLocaleString('fr-FR')}\nDE : ${document.getElementById('vlmId').value}\n\n`;
        msg += `1. JE SUIS :\n- Secteur : ${localCurrentZone}\n- Pos : ${cz.loc || 'N/C'}\n- Resp : ${cz.med || 'N/C'}\n\n`;
        msg += `2. JE VOIS :\n- Nature : ${document.getElementById('typo1').value} / ${document.getElementById('typo2').value}\n- Sécu : ${document.getElementById('secureStatus').value}\n- Bilan : UA:${cz.red} / UR:${cz.yellow} / V:${cz.green}\n\n`;
        msg += `3. JE PRÉVOIS :\n- PRM : ${document.getElementById('locPRM').value || 'N/C'}\n- Évolution : ${document.getElementById('evolStatus').value}\n\n`;
        msg += `4. BESOINS :\n${needs || '- Néant'}\n\n${prefix}*** TERMINÉ ***`;
        document.getElementById('radioText').value = msg;
    };

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('fr-FR'); }, 1000);
</script>
</body>
</html>
